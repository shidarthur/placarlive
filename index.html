<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Placar Tenis de Mesa Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .mesa { background: #1e1e1e; border: 2px solid #333; border-radius: 15px; width: 350px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .placar-box { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; background: #000; padding: 20px; border-radius: 10px; }
        .pontos { font-size: 70px; font-weight: bold; color: #00ff00; line-height: 1; }
        .label { font-size: 12px; color: #aaa; margin-top: 5px; }
        .sets { font-size: 24px; color: #ff9800; margin-bottom: 10px; }
        .saque { height: 12px; width: 12px; background: #ffff00; border-radius: 50%; margin: 5px auto; visibility: hidden; }
        .saque.ativo { visibility: visible; box-shadow: 0 0 10px #ffff00; }
        .info-footer { font-size: 13px; color: #666; border-top: 1px solid #333; padding-top: 10px; }
        button { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #666; }
    </style>
</head>
<body>

    <div class="mesa" id="mesa1">
        <h2 style="color:#00d4ff">MESA 1</h2>
        <div class="sets" id="m1-sets">SETS: 0 - 0</div>
        
        <div class="placar-box">
            <div style="flex:1">
                <div id="m1-s1" class="saque"></div>
                <div class="pontos" id="m1-p1">0</div>
                <div class="label" id="m1-l1">JOGADOR 1</div>
            </div>
            <div style="font-size:30px; color:#444">VS</div>
            <div style="flex:1">
                <div id="m1-s2" class="saque"></div>
                <div class="pontos" id="m1-p2">0</div>
                <div class="label" id="m1-l2">JOGADOR 2</div>
            </div>
        </div>

        <div class="info-footer">
            <span id="m1-msg">Set 1 - Lado Normal</span><br>
            <button onclick="resetMesa('mesa1')">Reiniciar Partida</button>
        </div>
    </div>

    <script>
        const client = new Paho.MQTT.Client("broker.hivemq.com", Number(8884), "client_" + Math.random().toString(16));

        // Estado inicial do jogo
        const bancoDados = {
            mesa1: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1, invertido: false }
        };

        function resetMesa(id) {
            bancoDados[id] = { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1, invertido: false };
            renderizar(id);
        }

        function renderizar(id) {
            const m = bancoDados[id];
            const prefix = id === 'mesa1' ? 'm1' : 'm2'; // Exemplo simplificado

            document.getElementById(`${prefix}-p1`).innerText = m.p1;
            document.getElementById(`${prefix}-p2`).innerText = m.p2;
            document.getElementById(`${prefix}-sets`).innerText = `SETS: ${m.s1} - ${m.s2}`;
            document.getElementById(`${prefix}-l1`).innerText = m.invertido ? "JOGADOR 2" : "JOGADOR 1";
            document.getElementById(`${prefix}-l2`).innerText = m.invertido ? "JOGADOR 1" : "JOGADOR 2";
            document.getElementById(`${prefix}-msg`).innerText = `Set ${m.setAtual} - ${m.invertido ? 'Lados Invertidos' : 'Lados Normais'}`;

            // Lógica de Saque (2 em 2, ou 1 em 1 se 10x10)
            const total = m.p1 + m.p2;
            let saqueJ1;
            if (m.p1 >= 10 && m.p2 >= 10) {
                saqueJ1 = (total % 2 === 0);
            } else {
                saqueJ1 = (Math.floor(total / 2) % 2 === 0);
            }

            document.getElementById(`${prefix}-s1`).className = `saque ${saqueJ1 ? 'ativo' : ''}`;
            document.getElementById(`${prefix}-s2`).className = `saque ${!saqueJ1 ? 'ativo' : ''}`;
        }

        function processarAcao(id, acao) {
            const m = bancoDados[id];
            
            // 1. Aplicar Pontos ou Subtração
            if (acao === 'A') {
                m.invertido ? m.p2++ : m.p1++;
            } else if (acao === 'B') {
                m.invertido ? m.p1++ : m.p2++;
            } else if (acao === 'RA') {
                m.invertido ? (m.p2 > 0 && m.p2--) : (m.p1 > 0 && m.p1--);
            } else if (acao === 'RB') {
                m.invertido ? (m.p1 > 0 && m.p1--) : (m.p2 > 0 && m.p2--);
            }

            // 2. Regra de Fim de Set (11 pontos e diferença de 2)
            if ((m.p1 >= 11 || m.p2 >= 11) && Math.abs(m.p1 - m.p2) >= 2) {
                if (m.p1 > m.p2) m.s1++; else m.s2++;
                m.p1 = 0; m.p2 = 0;
                m.setAtual++;
                m.invertido = !m.invertido; // Inverte para o próximo set
            }

            renderizar(id);
        }

        client.onMessageArrived = (msg) => {
            const mesaId = msg.destinationName.split('/')[1];
            const acao = msg.payloadString;
            if (bancoDados[mesaId]) processarAcao(mesaId, acao);
        };

        client.connect({ useSSL: true, onSuccess: () => {
            client.subscribe("tenis_mesa/+/comando");
            console.log("Conectado!");
        }});
    </script>
</body>
</html>
