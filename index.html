<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Tênis de Mesa - Placar Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent: #00d4ff;
            --score: #00ff00;
            --set-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 30px;
        }

        .mesa {
            background: var(--card-bg);
            border-radius: 25px;
            width: 400px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid #333;
        }

        /* NOVO LAYOUT DE SETS */
        .set-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .set-nome {
            font-size: 14px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
            width: 100px;
        }

        .set-placar {
            font-size: 32px;
            font-weight: 900;
            color: var(--set-color);
            background: #333;
            padding: 5px 20px;
            border-radius: 10px;
            min-width: 80px;
        }

        /* PLACAR DE PONTOS */
        .placar-principal {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #000;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .pontos {
            font-size: 90px;
            font-weight: bold;
            color: var(--score);
            font-family: 'Courier New', monospace;
        }

        .saque {
            height: 15px;
            width: 15px;
            background: #ffff00;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            visibility: hidden;
        }

        .saque.ativo {
            visibility: visible;
            box-shadow: 0 0 20px #ffff00;
        }

        .info-status {
            color: var(--accent);
            font-size: 14px;
            margin-bottom: 15px;
        }

        button {
            background: #600;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #900; }
        
        .mesa-id { font-size: 12px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="mesa" id="mesa1">
        <h3 style="color:var(--accent); margin-top:0;">MESA 1</h3>
        
        <div class="set-header">
            <div class="set-nome" id="m1-set-n1" style="text-align: right;">JOGADOR 1</div>
            <div class="set-placar" id="m1-sets">0 x 0</div>
            <div class="set-nome" id="m1-set-n2" style="text-align: left;">JOGADOR 2</div>
        </div>

        <div class="placar-principal">
            <div>
                <div id="m1-s1" class="saque"></div>
                <div class="pontos" id="m1-p1">0</div>
            </div>
            <div style="font-size: 40px; color: #222;">:</div>
            <div>
                <div id="m1-s2" class="saque"></div>
                <div class="pontos" id="m1-p2">0</div>
            </div>
        </div>

        <div class="info-status" id="m1-info">Set 1 - Normal</div>
        <button onclick="enviarReset('mesa1')">Zerar Mesa 1</button>
        <div class="mesa-id">ID: esp_1</div>
    </div>

    <div class="mesa" id="mesa2">
        <h3 style="color:var(--accent); margin-top:0;">MESA 2</h3>
        <div class="set-header">
            <div class="set-nome" id="m2-set-n1" style="text-align: right;">JOGADOR 1</div>
            <div class="set-placar" id="m2-sets">0 x 0</div>
            <div class="set-nome" id="m2-set-n2" style="text-align: left;">JOGADOR 2</div>
        </div>
        <div class="placar-principal">
            <div><div id="m2-s1" class="saque"></div><div class="pontos" id="m2-p1">0</div></div>
            <div style="font-size: 40px; color: #222;">:</div>
            <div><div id="m2-s2" class="saque"></div><div class="pontos" id="m2-p2">0</div></div>
        </div>
        <div class="info-status" id="m2-info">Set 1 - Normal</div>
        <button onclick="enviarReset('mesa2')">Zerar Mesa 2</button>
        <div class="mesa-id">ID: esp_2</div>
    </div>

    <div class="mesa" id="mesa3">
        <h3 style="color:var(--accent); margin-top:0;">MESA 3</h3>
        <div class="set-header">
            <div class="set-nome" id="m3-set-n1" style="text-align: right;">JOGADOR 1</div>
            <div class="set-placar" id="m3-sets">0 x 0</div>
            <div class="set-nome" id="m3-set-n2" style="text-align: left;">JOGADOR 2</div>
        </div>
        <div class="placar-principal">
            <div><div id="m3-s1" class="saque"></div><div class="pontos" id="m3-p1">0</div></div>
            <div style="font-size: 40px; color: #222;">:</div>
            <div><div id="m3-s2" class="saque"></div><div class="pontos" id="m3-p2">0</div></div>
        </div>
        <div class="info-status" id="m3-info">Set 1 - Normal</div>
        <button onclick="enviarReset('mesa3')">Zerar Mesa 3</button>
        <div class="mesa-id">ID: esp_3</div>
    </div>

    <script>
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "client_" + Math.random().toString(16));

        const db = {
            mesa1: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1, invertido: false, modulo: "esp_1" },
            mesa2: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1, invertido: false, modulo: "esp_2" },
            mesa3: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1, invertido: false, modulo: "esp_3" }
        };

        function render(id) {
            const m = db[id];
            const p = id === 'mesa1' ? 'm1' : (id === 'mesa2' ? 'm2' : 'm3');
            
            // Placar de Pontos
            document.getElementById(`${p}-p1`).innerText = m.p1;
            document.getElementById(`${p}-p2`).innerText = m.p2;
            
            // Placar de Sets no novo formato: "J1 3 x 2 J2"
            // Note que os nomes acompanham a inversão
            const nomeLadoEsq = m.invertido ? "JOGADOR 2" : "JOGADOR 1";
            const nomeLadoDir = m.invertido ? "JOGADOR 1" : "JOGADOR 2";
            
            document.getElementById(`${p}-set-n1`).innerText = nomeLadoEsq;
            document.getElementById(`${p}-set-n2`).innerText = nomeLadoDir;
            document.getElementById(`${p}-sets`).innerText = `${m.s1} x ${m.s2}`;
            
            document.getElementById(`${p}-info`).innerText = `Set ${m.setAtual} - ${m.invertido ? 'Invertido' : 'Normal'}`;

            // Saque
            const total = m.p1 + m.p2;
            let saqueEsq = (m.p1 >= 10 && m.p2 >= 10) ? (total % 2 === 0) : (Math.floor(total/2) % 2 === 0);
            document.getElementById(`${p}-s1`).className = `saque ${saqueEsq ? 'ativo' : ''}`;
            document.getElementById(`${p}-s2`).className = `saque ${!saqueEsq ? 'ativo' : ''}`;
        }

        function enviarReset(id) {
            const msg = new Paho.MQTT.Message(JSON.stringify({comando: "RESET"}));
            msg.destinationName = `tenis_mesa/${id}/controle`;
            client.send(msg);
            db[id].s1 = 0; db[id].s2 = 0; db[id].setAtual = 1; db[id].invertido = false;
            render(id);
        }

        client.onMessageArrived = (msg) => {
            const json = JSON.parse(msg.payloadString);
            const id = Object.keys(db).find(k => db[k].modulo === json.moduloID);
            
            if (id) {
                const m = db[id];
                if (!m.invertido) { m.p1 = json.jg1; m.p2 = json.jg2; } 
                else { m.p1 = json.jg2; m.p2 = json.jg1; }

                if ((m.p1 >= 11 || m.p2 >= 11) && Math.abs(m.p1 - m.p2) >= 2) {
                    if (m.p1 > m.p2) m.s1++; else m.s2++;
                    m.setAtual++; m.invertido = !m.invertido;
                    enviarReset(id);
                }
                render(id);
            }
        };

        client.connect({ useSSL: true, onSuccess: () => {
            client.subscribe("tenis_mesa/+/pontos");
            console.log("Conectado");
        }});
    </script>
</body>
</html>
