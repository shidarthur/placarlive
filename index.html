<!DOCTYPE html>
<html>
<head>
    <title>Placar Online Arcade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #222; color: #0f0; text-align: center; padding-top: 50px; }
        .placar { font-size: 80px; border: 4px solid #0f0; display: inline-block; padding: 20px; border-radius: 15px; }
        h1 { color: #fff; }
    </style>
</head>
<body>
    <h1>PLACAR ARCADE AO VIVO</h1>
    <div class="placar" id="display">Aguardando dados...</div>

    <script>
        // No início do script
        document.getElementById("display").innerHTML = "Sincronizando placar...";
        // Alterações: 
        // 1. Usamos a porta 8884 (porta segura do HiveMQ)
        // 2. Ativamos a flag useSSL: true
        client = new Paho.MQTT.Client("broker.hivemq.com", Number(8884), "web_client_" + Math.random());
        
        client.onMessageArrived = (message) => {
            document.getElementById("display").innerHTML = message.payloadString;
        };
        
        // Configurações de conexão segura
        var options = {
            useSSL: true,
            onSuccess: onConnect,
            onFailure: (message) => {
                console.log("Falha na conexão: " + message.errorMessage);
            }
        };
        
        function onConnect() {
            console.log("Conectado com sucesso via WSS!");
           
        }
        function onConnect() {
            console.log("Conectado!");
            // Ao assinar o tópico, se houver uma mensagem "Retida", 
            // o evento onMessageArrived será disparado instantaneamente
            client.subscribe("projeto_arcade_mika_2024_xyz/placar"); // Use o mesmo tópico do ESP32 
        }
        
        client.connect(options);    
            </script>
</body>
</html>
