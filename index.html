<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Placar Tenis de Mesa JSON</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .mesa { background: #1e1e1e; border: 2px solid #333; border-radius: 15px; width: 350px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .placar-box { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; background: #000; padding: 20px; border-radius: 10px; }
        .pontos { font-size: 75px; font-weight: bold; color: #00ff00; line-height: 1; }
        .label { font-size: 13px; color: #aaa; margin-top: 5px; text-transform: uppercase; }
        .sets { font-size: 26px; color: #ff9800; font-weight: bold; }
        .saque { height: 12px; width: 12px; background: #ffff00; border-radius: 50%; margin: 5px auto; visibility: hidden; }
        .saque.ativo { visibility: visible; box-shadow: 0 0 10px #ffff00; }
        button { background: #cc0000; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .info { margin-top: 15px; font-size: 14px; color: #00d4ff; }
    </style>
</head>
<body>

    <div class="mesa" id="mesa1">
        <h2 id="m1-title">MESA 1</h2>
        <div class="sets" id="m1-sets">SETS: 0 - 0</div>
        <div class="placar-box">
            <div style="flex:1">
                <div id="m1-s1" class="saque"></div>
                <div class="pontos" id="m1-p1">0</div>
                <div class="label" id="m1-l1">JOGADOR 1</div>
            </div>
            <div style="flex:1">
                <div id="m1-s2" class="saque"></div>
                <div class="pontos" id="m1-p2">0</div>
                <div class="label" id="m1-l2">JOGADOR 2</div>
            </div>
        </div>
        <div class="info" id="m1-info">Set 1 - Lados Normais</div>
        <br>
        <button onclick="enviarReset('mesa1')">RESETAR PARTIDA</button>
    </div>

    <script>
        const client = new Paho.MQTT.Client("broker.hivemq.com", Number(8884), "web_tm_" + Math.random().toString(16));

        const db = {
            mesa1: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1, invertido: false }
        };

        function enviarReset(mesaId) {
            // Envia comando para o ESP32 zerar os contadores jg1 e jg2
            const message = new Paho.MQTT.Message(JSON.stringify({comando: "RESET"}));
            message.destinationName = `tenis_mesa/${mesaId}/controle`;
            client.send(message);

            db[mesaId].s1 = 0; db[mesaId].s2 = 0; db[mesaId].setAtual = 1; db[mesaId].invertido = false;
            render(mesaId);
        }

        function render(id) {
            const m = db[id];
            const pref = id === 'mesa1' ? 'm1' : 'm2';
            
            document.getElementById(`${pref}-p1`).innerText = m.p1;
            document.getElementById(`${pref}-p2`).innerText = m.p2;
            document.getElementById(`${pref}-sets`).innerText = `SETS: ${m.s1} - ${m.s2}`;
            document.getElementById(`${pref}-l1`).innerText = m.invertido ? "JOGADOR 2" : "JOGADOR 1";
            document.getElementById(`${pref}-l2`).innerText = m.invertido ? "JOGADOR 1" : "JOGADOR 2";
            document.getElementById(`${pref}-info`).innerText = `Set ${m.setAtual} - ${m.invertido ? 'Invertido' : 'Normal'}`;

            const total = m.p1 + m.p2;
            let saqueJ1 = (m.p1 >= 10 && m.p2 >= 10) ? (total % 2 === 0) : (Math.floor(total / 2) % 2 === 0);
            document.getElementById(`${pref}-s1`).className = `saque ${saqueJ1 ? 'ativo' : ''}`;
            document.getElementById(`${pref}-s2`).className = `saque ${!saqueJ1 ? 'ativo' : ''}`;
        }

        client.onMessageArrived = (msg) => {
            const json = JSON.parse(msg.payloadString);
            const mesaId = json.moduloID === "esp_1" ? "mesa1" : "mesa2";
            const m = db[mesaId];

            // Inversão lógica: O botão A (jg1) é sempre do lado esquerdo da mesa física
            if (!m.invertido) {
                m.p1 = json.jg1; m.p2 = json.jg2;
            } else {
                m.p1 = json.jg2; m.p2 = json.jg1;
            }

            // Regra de Fim de Set
            if ((m.p1 >= 11 || m.p2 >= 11) && Math.abs(m.p1 - m.p2) >= 2) {
                if (m.p1 > m.p2) m.s1++; else m.s2++;
                m.setAtual++;
                m.invertido = !m.invertido;
                // Força o ESP a zerar para o próximo set
                enviarReset(mesaId); 
            }
            render(mesaId);
        };

        client.connect({ useSSL: true, onSuccess: () => {
            client.subscribe("tenis_mesa/+/pontos");
        }});
    </script>
</body>
</html>
