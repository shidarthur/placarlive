<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Live Pong - 3 Mesas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; gap: 20px; justify-content: center; padding: 20px; }
        .mesa-card { border: 2px solid #444; border-radius: 10px; padding: 20px; width: 300px; background: #222; text-align: center; }
        .placar-grande { font-size: 60px; font-weight: bold; color: #00ff00; margin: 10px 0; }
        .sets { font-size: 20px; color: #aaa; }
        .sacador { color: #ffff00; font-size: 14px; text-transform: uppercase; margin-top: 10px; }
        .mesa-titulo { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; color: #00d4ff; }
        .vitoria { color: #ff4500; font-weight: bold; }
    </style>
</head>
<body>

    <div id="mesa1" class="mesa-card">
        <div class="mesa-titulo">MESA 1</div>
        <div class="sets" id="m1-sets">Sets: 0 - 0</div>
        <div class="placar-grande" id="m1-pontos">0 - 0</div>
        <div class="sacador" id="m1-saque">Inicie o jogo</div>
    </div>

    <div id="mesa2" class="mesa-card">
        <div class="mesa-titulo">MESA 2</div>
        <div class="sets" id="m2-sets">Sets: 0 - 0</div>
        <div class="placar-grande" id="m2-pontos">0 - 0</div>
        <div class="sacador" id="m2-saque">Inicie o jogo</div>
    </div>

    <div id="mesa3" class="mesa-card">
        <div class="mesa-titulo">MESA 3</div>
        <div class="sets" id="m3-sets">Sets: 0 - 0</div>
        <div class="placar-grande" id="m3-pontos">0 - 0</div>
        <div class="sacador" id="m3-saque">Inicie o jogo</div>
    </div>

    <script>
        // Configuração MQTT
        const client = new Paho.MQTT.Client("broker.hivemq.com", Number(8884), "web_pong_" + Math.random());

        // Objeto para controlar o estado de cada mesa
        const estados = {
            mesa1: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1 },
            mesa2: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1 },
            mesa3: { p1: 0, p2: 0, s1: 0, s2: 0, setAtual: 1 }
        };

        client.onMessageArrived = (message) => {
            const mesaId = message.destinationName.split('/')[1]; // Pega 'mesa1', 'mesa2' ou 'mesa3'
            const payload = message.payloadString; // Espera formato "P1 x P2" vindo do ESP32
            
            processarPontos(mesaId, payload);
        };

        function processarPontos(id, payload) {
            const pts = payload.replace(/[()a-zA-Z]/g, '').split('x').map(Number);
            let pA = pts[0];
            let pB = pts[1];

            const mesa = estados[id];
            
            // Lógica de Inversão de Lados baseada no Set
            // Se set for par (2 ou 4), invertemos a atribuição dos botões
            let pontoJ1, pontoJ2;
            if (mesa.setAtual % 2 !== 0) {
                pontoJ1 = pA; pontoJ2 = pB;
            } else {
                pontoJ1 = pB; pontoJ2 = pA;
            }

            // Verificar fim do Set (Regra 11 pontos e vantagem de 2)
            if ((pontoJ1 >= 11 || pontoJ2 >= 11) && Math.abs(pontoJ1 - pontoJ2) >= 2) {
                if (pontoJ1 > pontoJ2) mesa.s1++; else mesa.s2++;
                // Reset para novo set (O ESP32 deve ser zerado manualmente ou via comando se preferir)
                mesa.setAtual++;
                alert(`Fim do Set na ${id}! Placar de Sets: ${mesa.s1} - ${mesa.s2}`);
            }

            // Lógica de Saque
            let total = pontoJ1 + pontoJ2;
            let quemSaca;
            if (pontoJ1 >= 10 && pontoJ2 >= 10) {
                // Deuce: muda a cada 1 ponto
                quemSaca = (total % 2 === 0) ? "Jogador 1" : "Jogador 2";
            } else {
                // Normal: muda a cada 2 pontos
                quemSaca = (Math.floor(total / 2) % 2 === 0) ? "Jogador 1" : "Jogador 2";
            }

            // Atualizar Tela
            document.getElementById(`${id.charAt(0)}${id.slice(1).replace('mesa', 'm')}-pontos`).innerHTML = `${pontoJ1} - ${pontoJ2}`;
            document.getElementById(`${id.charAt(0)}${id.slice(1).replace('mesa', 'm')}-sets`).innerHTML = `Sets: ${mesa.s1} - ${mesa.s2}`;
            document.getElementById(`${id.charAt(0)}${id.slice(1).replace('mesa', 'm')}-saque`).innerHTML = `SAQUE: ${quemSaca}`;
        }

        client.connect({ useSSL: true, onSuccess: () => {
            client.subscribe("tenis_mesa/+/pontos"); // O '+' é um wildcard para pegar todas as mesas
            console.log("Conectado!");
        }});
    </script>
</body>
</html>
