<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arena Tênis de Mesa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: white; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .mesa { background: #1e1e1e; border: 3px solid #333; border-radius: 20px; width: 350px; padding: 25px; text-align: center; }
        .placar-container { display: flex; justify-content: space-around; align-items: center; margin: 20px 0; }
        .jogador { flex: 1; }
        .pontos { font-size: 80px; font-weight: bold; color: #00ff00; }
        .sets { font-size: 24px; color: #ff9800; }
        .saque-indicador { height: 10px; width: 10px; background: #ffff00; border-radius: 50%; display: inline-block; visibility: hidden; }
        .ativo { visibility: visible; }
        .info { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="mesa" id="mesa1">
        <h2>MESA 1</h2>
        <div class="sets" id="m1-sets">0 - 0</div>
        <div class="placar-container">
            <div class="jogador">
                <div id="m1-s-j1" class="saque-indicador"></div>
                <div class="pontos" id="m1-p1">0</div>
                <div>JOGADOR 1</div>
            </div>
            <div style="font-size: 30px;">x</div>
            <div class="jogador">
                <div id="m1-s-j2" class="saque-indicador"></div>
                <div class="pontos" id="m1-p2">0</div>
                <div>JOGADOR 2</div>
            </div>
        </div>
        <div class="info" id="m1-msg">Set 1 - Lado Normal</div>
        <button onclick="resetarMesa('mesa1')" style="margin-top:15px; cursor:pointer;">Resetar Partida</button>
    </div>

    <script>
        const client = new Paho.MQTT.Client("broker.hivemq.com", Number(8884), "web_logic_" + Math.random().toString(16));

        // Objeto de estado para cada mesa
        const jogo = {
            mesa1: { p1: 0, p2: 0, sets1: 0, sets2: 0, setAtual: 1, invertido: false }
            // mesa2: ... mesa3: ...
        };

        function resetarMesa(id) {
            jogo[id] = { p1: 0, p2: 0, sets1: 0, sets2: 0, setAtual: 1, invertido: false };
            atualizarTela(id);
        }

        function atualizarTela(id) {
            const m = jogo[id];
            const prefix = id === 'mesa1' ? 'm1' : 'm2'; // Simplificado para exemplo
            
            document.getElementById(`${prefix}-p1`).innerText = m.p1;
            document.getElementById(`${prefix}-p2`).innerText = m.p2;
            document.getElementById(`${prefix}-sets`).innerText = `${m.sets1} - ${m.sets2}`;
            document.getElementById(`${prefix}-msg`).innerText = `Set ${m.setAtual} - ${m.invertido ? 'Lados Invertidos' : 'Lados Normais'}`;

            // Lógica de Saque
            const total = m.p1 + m.p2;
            const saqueJ1 = (m.p1 >= 10 && m.p2 >= 10) ? (total % 2 === 0) : (Math.floor(total / 2) % 2 === 0);
            
            document.getElementById(`${prefix}-s-j1`).className = `saque-indicador ${saqueJ1 ? 'ativo' : ''}`;
            document.getElementById(`${prefix}-s-j2`).className = `saque-indicador ${!saqueJ1 ? 'ativo' : ''}`;
        }

        function processarPonto(id, botao) {
            const m = jogo[id];
            
            // Inversão: Se estiver invertido, botão A dá ponto ao Jogador 2
            if (!m.invertido) {
                if (botao === 'A') m.p1++; else m.p2++;
            } else {
                if (botao === 'A') m.p2++; else m.p1++;
            }

            // Fim do Set?
            if ((m.p1 >= 11 || m.p2 >= 11) && Math.abs(m.p1 - m.p2) >= 2) {
                if (m.p1 > m.p2) m.sets1++; else m.sets2++;
                m.p1 = 0; m.p2 = 0;
                m.setAtual++;
                m.invertido = !m.invertido; // Inverte o lado para o próximo set
                alert("Fim do Set!");
            }

            atualizarTela(id);
        }

        client.onMessageArrived = (msg) => {
            const mesaId = msg.destinationName.split('/')[1];
            const botao = msg.payloadString; // "A" ou "B"
            processarPonto(mesaId, botao);
        };

        client.connect({ useSSL: true, onSuccess: () => {
            client.subscribe("tenis_mesa/+/comando");
        }});
    </script>
</body>
</html>
